<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatGPT-PRepo</title>
    <link rel="stylesheet" href="./style/style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0">
</head>
<body>
    <div class="search-zone">
        <input type="text" placeholder="Search">
        <button role="button" data-option="filter" title="Filter:&#x0A;- Description Search"><span class="material-symbols-outlined">filter_alt</span></button>
        <button role="button" data-option="sort" title="Sort"><span class="material-symbols-outlined">sort</span></button>
        <button role="button" data-option="customPrompt" title="Custom Prompt"><span class="material-symbols-outlined">add</span></button>
        <button role="button" data-option="checkForUpdates" title="Check for updates"><span class="material-symbols-outlined">refresh</span></button>
    </div>
    <div id="repo"></div>
    <script src="./script.js"></script>
</body>
</html>
